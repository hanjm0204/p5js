<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pochacco p5.js Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
      /* 포차코 감성의 포근한 파스텔 민트 & 밀크 그라데이션 배경 */
      background: linear-gradient(135deg, #eef7f2 0%, #f9f9f6 100%);
      color: #333333;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #2c3e50;
      margin-bottom: 10px;
      display: inline-block;
      position: relative;
    }

    /* 타이틀 옆 귀여운 포인트 장식 */
    h1::after {
      content: ' 🐾';
      font-size: 1.8rem;
    }

    p.subtitle {
      color: #7f8c8d;
      font-size: 1.05rem;
      font-weight: 400;
    }

    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      max-width: 800px;
      gap: 24px;
    }

    .card {
      /* 포차코 화이트 톤의 깔끔하고 둥글둥글한 카드 UI */
      background: #ffffff;
      border: 3px solid #e2ece9;
      border-radius: 24px; /* 더 폭신하고 동글동글하게 변화 */
      padding: 20px;
      box-shadow: 0 8px 20px rgba(180, 195, 188, 0.2);
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    /* 마우스를 올리면 포차코 시그니처 잎새 연두색(#8bc34a) 구름 효과 */
    .card:hover {
      transform: translateY(-5px);
      border-color: #9ccc65;
      box-shadow: 0 12px 25px rgba(156, 204, 101, 0.3);
    }

    .card h2 {
      font-size: 1.05rem;
      margin-bottom: 14px;
      color: #43a047; /* 싱그러운 포차코 그린 컬러 */
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card h2::before {
      content: '🐶';
      font-size: 1.1rem;
    }

    /* 내부 액자 틀 */
    .cell {
      position: relative;
      width: 100%;
      height: 250px; 
      overflow: hidden; 
      border-radius: 12px;
      background: #ffffff; /* 액자 배경도 밝은 톤으로 통일 */
      border: 1px solid #e0e0e0;
    }

    /* 기본 600x400 과제들 (1, 3, 4번) 비율 축소 */
    #projects .cell iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 600px;
      height: 400px;
      border: none;
      transform: translate(-50%, -50%) scale(0.62); 
      transform-origin: center;
    }

    /* 과제 2번(정적 캐리커처) 400x400 맞춤 세팅 유지 */
    #projects .cell iframe.sample2-fix {
      width: 400px;
      height: 400px;
      transform: translate(-50%, -50%) scale(0.62);
    }

    @media (max-width: 650px) {
      #projects {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>강아지와 함께하는 미디어 아트</h1>
    <p class="subtitle">p5.js 코딩으로 빚어낸 그래픽 아카이브</p>
  </header>

  <main id="projects">

    <div class="card">
      <h2>ASSIGNMENT 1. 정적 추상화 (피자)</h2>
      <div class="cell">
        <iframe src="sample1/index.html" scrolling="no"></iframe>
      </div>
    </div>

    <div class="card">
      <h2>ASSIGNMENT 4. 동적 추상화 (피자)</h2>
      <div class="cell">
        <iframe src="sample4/index.html" scrolling="no"></iframe>
      </div>
    </div>

    <div class="card">
      <h2>ASSIGNMENT 2. 정적 캐리커처</h2>
      <div class="cell">
        <iframe src="sample2/index.html" scrolling="no" class="sample2-fix"></iframe>
      </div>
    </div>

    <div class="card">
      <h2>ASSIGNMENT 3. 동적 캐리커처</h2>
      <div class="cell">
        <iframe src="sample3/index.html" scrolling="no"></iframe>
      </div>
    </div>

  </main>

</body>
</html>
